<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FreeWalkins Admin V5.3 Ultimate Fix</title>
<style>
body{font-family:Arial,sans-serif;background:#f3f4f6;margin:0}
.hidden{display:none}
.login{max-width:350px;margin:80px auto;background:#fff;padding:20px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.wrap{max-width:1000px;margin:auto;padding:12px}
.card{background:#fff;padding:15px;border-radius:14px;margin-bottom:15px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat{background:#ecfdf5;padding:12px;border-radius:10px;text-align:center}
input,select,button{width:100%;padding:12px;margin:6px 0 12px;border-radius:10px;box-sizing:border-box}
input,select{border:1px solid #ddd}
button{border:none;cursor:pointer}
.save{background:#16a34a;color:#fff}
.edit{background:#f59e0b;color:#fff;width:auto}
.del{background:#dc2626;color:#fff;width:auto}
.job{border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-top:10px}
.dark{background:#111827;color:#fff}
.dark .card,.dark .login{background:#1f2937}
</style>
</head>
<body>

<div id="loginBox" class="login">
<h2>Admin Login</h2>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button class="save" onclick="login()">Login</button>
<p>Default: admin / 12345</p>
</div>

<div id="app" class="hidden">
<div class="wrap">
<div class="card">
<button onclick="toggleDark()">🌙 Dark Mode</button>
<h1>FreeWalkins Admin V5.3 Ultimate Fix</h1>

<div class="stats">
<div class="stat"><b id="totalJobs">0</b><br>Total Jobs</div>
<div class="stat"><b id="activeJobs">0</b><br>Active Jobs</div>
<div class="stat"><b id="expiredJobs">0</b><br>Expired Jobs</div>
</div>

<input id="search" placeholder="Search jobs">
<input id="title" placeholder="Job Title">
<input id="company" placeholder="Company">
<input id="jobLocation" placeholder="Location">
<input id="salary" type="number" placeholder="Salary">

<input id="whatsappNumber" placeholder="Company WhatsApp Number (+91xxxxxxxxxx)">

<select id="jobGender">
<option>Both</option>
<option>Male</option>
<option>Female</option>
</select>

<select id="jobType">
<option>Full Time</option>
<option>Part Time</option>
<option>Night Shift</option>
</select>

<select id="status">
<option value="Active">Active</option>
<option value="Inactive">Inactive</option>
</select>


<select id="category">
<option>IT</option><option>Non-IT</option><option>Banking</option>
<option>BPO</option><option>Pharma</option><option>Warehouse</option>
<option>Telecalling</option><option>Sales</option>
</select>

<select id="experience">
<option>Fresher</option><option>0-1 Year</option><option>1-3 Years</option>
<option>3-5 Years</option><option>5+ Years</option>
</select>

<input id="expiryDate" type="date">
<button id="saveBtn" class="save">Save Job</button>
</div>

<div class="card">
<h2>Jobs</h2>
<div id="jobs">Loading...</div>
</div>
</div>
</div>

<script type="module">
import {initializeApp} from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';
import {getFirestore,collection,addDoc,getDocs,doc,updateDoc,deleteDoc,serverTimestamp}
from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js';

const firebaseConfig={
apiKey:'AIzaSyAC8cxjgdG7ABnR5Nt7HaVuXWV9iznUAl0',
authDomain:'freewalkinsupdates-a87e0.firebaseapp.com',
projectId:'freewalkinsupdates-a87e0',
storageBucket:'freewalkinsupdates-a87e0.firebasestorage.app',
messagingSenderId:'648268858586',
appId:'1:648268858586:web:c5d3c79d8157e8a97151e3'
};

const db=getFirestore(initializeApp(firebaseConfig));
let jobs=[], editId=null;

window.login=function(){
 if(u.value==='admin' && p.value==='12345'){
   loginBox.classList.add('hidden');
   app.classList.remove('hidden');
 } else alert('Invalid login');
}

window.toggleDark=function(){document.body.classList.toggle('dark')}

async function loadJobs(){
 const snap=await getDocs(collection(db,'jobs'));
 jobs=[];
 snap.forEach(d=>jobs.push({id:d.id,...d.data()}));

 const today=new Date().toISOString().split('T')[0];
 totalJobs.innerText=jobs.length;
 activeJobs.innerText=jobs.filter(j=>!j.expiryDate || j.expiryDate>=today).length;
 expiredJobs.innerText=jobs.filter(j=>j.expiryDate && j.expiryDate<today).length;

 renderJobs();
}

window.renderJobs=function(){
 const q=(search.value||'').toLowerCase();
 const list=jobs.filter(j=>`${j.title||''} ${j.company||''}`.toLowerCase().includes(q));

 jobs.innerHTML='';
 document.getElementById('jobs').innerHTML=list.map(j=>`
 <div class="job">
 <b>${j.title||''}</b><br>
 🏢 ${j.company||''}<br>
 📍 ${j.location||''}<br>
 💰 ₹${j.salary||0}<br>
👥 ${j.jobGender||'Both'}<br>
🕒 ${j.jobType||'Full Time'}<br>
✅ ${j.status||'Active'}<br>
⏰ ${j.expiryDate||'No Expiry'}<br><br>
 <button class="edit" onclick="editJob('${j.id}')">Edit</button>
 <button class="del" onclick="removeJob('${j.id}')">Delete</button>
 </div>`).join('') || 'No jobs';
}

search.addEventListener('input',renderJobs);

window.editJob=function(id){
 const j=jobs.find(x=>x.id===id);
 editId=id;
 ['title','company','salary','category','experience','expiryDate','whatsappNumber','jobGender','jobType','status']
 .forEach(k=>document.getElementById(k).value=j[k]||'');
 document.getElementById('jobLocation').value = j.location || '';
 saveBtn.innerText='Update Job';
}

window.removeJob=async function(id){
 if(!confirm('Delete job?')) return;
 await deleteDoc(doc(db,'jobs',id));
 loadJobs();
}

saveBtn.addEventListener('click',async()=>{
try{
 const data={
  title:(title.value||'').trim(),
  company:(company.value||'').trim(),
  location: document.getElementById('jobLocation').value.trim(),
  salary:Number(salary.value||0),
  whatsappNumber:(whatsappNumber.value||'').trim(),
  jobGender:jobGender.value || 'Both',
  jobType:jobType.value || 'Full Time',
  status:status.value || 'Active',
  category:category.value,
  experience:experience.value,
  expiryDate:expiryDate.value
 };

 if(!data.title || !data.company){
   alert('Title and Company required');
   return;
 }

 if(editId){
   await updateDoc(doc(db,'jobs',editId),data);
   editId=null;
   saveBtn.innerText='Save Job';
   alert('Job updated successfully');
 }else{
   data.createdAt=serverTimestamp();
   await addDoc(collection(db,'jobs'),data);
   alert('Job saved successfully');
 }

 title.value='';
 company.value='';
 document.getElementById('jobLocation').value='';
 salary.value='';
 whatsappNumber.value='';
 expiryDate.value='';
 jobGender.value='Both';
 jobType.value='Full Time';
 status.value='Active';
 category.selectedIndex=0;
 experience.selectedIndex=0;

 await loadJobs();
}catch(err){
 console.error(err);
 alert('Error: '+err.message);
}
});

loadJobs();
</script>
</body>
</html>
